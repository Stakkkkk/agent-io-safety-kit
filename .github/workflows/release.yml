name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24.x

      - name: Verify tag and release metadata
        run: node scripts/check-release.mjs --tag "${{ github.ref_name }}"

      - name: Run checks
        run: |
          npm test
          npm run check:text
          npm run check:localization
          npm run check:skills

      - name: Pack distributable
        id: pack
        shell: bash
        run: |
          package_file="$(npm pack --silent)"
          sha256sum "$package_file" > "$package_file.sha256"
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        run: node scripts/release-notes.mjs "${{ github.ref_name }}" > RELEASE_NOTES.md

      - name: Create or update release and upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PACKAGE_FILE: ${{ steps.pack.outputs.package_file }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md
          fi
          gh release upload "$TAG" "$PACKAGE_FILE" "$PACKAGE_FILE.sha256" --clobber
