name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, specs, files, and expected vs actual behavior.
      render: shell
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and shell
      placeholder: Windows 11 + PowerShell 5.1, Ubuntu + bash, macOS + zsh
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v24.18.0
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Do not include secrets.
